<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Text Reader</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f7f9fc;
    }
    .container {
      width: min(100%, 480px);
      padding: 32px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.08);
    }
    label,
    button,
    p {
      display: block;
      width: 100%;
    }
    input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d8dbe4;
      border-radius: 10px;
      margin-top: 8px;
      margin-bottom: 16px;
      font-size: 1rem;
      box-sizing: border-box;
    }
    button {
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    button:hover {
      background: #1d4ed8;
    }
    .output {
      margin-top: 20px;
      padding: 16px;
      border-radius: 12px;
      background: #eef2ff;
      color: #1e293b;
      min-height: 56px;
      display: flex;
      align-items: center;
      font-size: 1rem;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Simple Text Reader</h1>
    <label for="userText">Enter text below:</label>
    <input id="userText" type="text" placeholder="Type something here..." />
    <label for="voiceSelect">Choose a voice:</label>
    <select id="voiceSelect" aria-label="Voice selection">
      <option>Loading voices...</option>
    </select>
    <button id="readButton" type="button">Read text aloud</button>
    <div class="output" id="outputText">Your text will appear here when you click the button.</div>
  </div>

  <script>
    const input = document.getElementById('userText');
    const voiceSelect = document.getElementById('voiceSelect');
    const button = document.getElementById('readButton');
    const output = document.getElementById('outputText');
    let voices = [];

    function populateVoices() {
      voices = window.speechSynthesis.getVoices();
      voiceSelect.innerHTML = '';

      if (!voices.length) {
        const option = document.createElement('option');
        option.textContent = 'No voices available';
        voiceSelect.appendChild(option);
        return;
      }

      voices.forEach((voice, index) => {
        const option = document.createElement('option');
        option.value = index;
        option.textContent = `${voice.name} (${voice.lang})${voice.default ? ' — default' : ''}`;
        voiceSelect.appendChild(option);
      });
    }

    function speakText(text) {
      if (!window.speechSynthesis) {
        alert('Speech synthesis is not supported in this browser.');
        return;
      }

      const utterance = new SpeechSynthesisUtterance(text);
      const selectedVoice = voices[voiceSelect.value];
      if (selectedVoice) {
        utterance.voice = selectedVoice;
      }
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(utterance);
    }

    if (window.speechSynthesis) {
      populateVoices();
      window.speechSynthesis.onvoiceschanged = populateVoices;
    }

    button.addEventListener('click', () => {
      const text = input.value.trim();
      const displayed = text ? text : 'No text entered yet. Please type something above.';
      output.textContent = displayed;

      if (text) {
        speakText(text);
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Text Reader</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f7f9fc;
    }
    .container {
      width: min(100%, 480px);
      padding: 32px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.08);
    }
    label,
    button,
    p {
      display: block;
      width: 100%;
    }
    input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d8dbe4;
      border-radius: 10px;
      margin-top: 8px;
      margin-bottom: 16px;
      font-size: 1rem;
      box-sizing: border-box;
    }
    button {
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    button:hover {
      background: #1d4ed8;
    }
    .output {
      margin-top: 20px;
      padding: 16px;
      border-radius: 12px;
      background: #eef2ff;
      color: #1e293b;
      min-height: 56px;
      display: flex;
      align-items: center;
      font-size: 1rem;
      word-break: break-word;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Simple Text Reader</h1>
    <label for="userText">Enter text below:</label>
    <input id="userText" value="Hello, world! How Are You?" type="text" placeholder="Type something here..." />
    <label for="voiceSelect">Choose a browser voice:</label>
    <div style="display: flex; gap: 12px; align-items: center; margin-bottom: 16px;">
      <select id="voiceSelect" aria-label="Browser voice selection">
        <option>Loading voices...</option>
      </select>
      <button id="saveBrowserVoiceButton" type="button">Save browser voice</button>
    </div>
    <label for="fallbackVoiceSelect">Fallback voice language:</label>
    <div style="display: flex; gap: 12px; align-items: center; margin-bottom: 16px;">
      <select id="fallbackVoiceSelect" aria-label="Fallback voice selection">
        <option value="">Use default voice</option>
        <option value="en-US">English (US)</option>
        <option value="en-GB">English (UK)</option>
        <option value="en-AU">English (Australia)</option>
        <option value="es-ES">Spanish (Spain)</option>
        <option value="fr-FR">French</option>
        <option value="de-DE">German</option>
        <option value="it-IT">Italian</option>
      </select>
      <button id="saveFallbackVoiceButton" type="button">Save fallback voice</button>
    </div>
    <label for="fallbackLanguageInput">Manual language code:</label>
    <div style="display: flex; gap: 12px; align-items: center; margin-bottom: 16px;">
      <input id="fallbackLanguageInput" type="text" placeholder="e.g. en-US or es-ES" />
      <button id="saveManualLanguageButton" type="button">Save manual language</button>
    </div>
    <div style="display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px;">
      <button id="readButton" type="button">Read text aloud</button>
      <button id="refreshVoicesButton" type="button">Repopulate voices</button>
      <button id="initVoicesButton" type="button">Initialize voices</button>
      <button id="clearVoicesButton" type="button">Clear all voices</button>
    </div>
    <div class="output" id="outputText">Your text will appear here when you click the button.</div>
  </div>

  <script type="module" src="dist/index.js"></script>
</body>
</html>
